name = "lv2park-email"
main = "index.js"
compatibility_date = "2024-01-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# After deploying, set these secrets via:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put RESEND_AUDIENCE_ID
#   wrangler secret put NOTIFY_EMAIL
#
# Then update app.js WORKER_URL with the deployed worker URL.
