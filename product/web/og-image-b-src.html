<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #1A1A2E;
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Yellow top bar */
  .bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: #F5E030;
  }

  /* Logo */
  .logo {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 36px;
    opacity: 0.7;
    position: relative;
    z-index: 1;
  }
  .logo span { color: #F5E030; }

  /* Main question */
  .question {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.0;
    color: #fff;
    letter-spacing: -.02em;
    margin-bottom: 32px;
    max-width: 820px;
    position: relative;
    z-index: 1;
  }
  .question em {
    font-style: normal;
    color: #F5E030;
  }

  /* Sub line */
  .sub {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    letter-spacing: .01em;
    position: relative;
    z-index: 1;
  }
  .sub strong {
    color: #F5E030;
    font-weight: 900;
  }

  /* Right side ghost answer */
  .badge {
    position: absolute;
    right: 80px;
    bottom: 64px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    z-index: 1;
  }
  .badge-answer {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    color: rgba(245,224,48,0.12);
    letter-spacing: -.04em;
  }
</style>
</head>
<body>
  <div class="bar"></div>

  <div class="logo">LV2 <span>PARK</span></div>

  <div class="question">
    Can I park in <em>LV2</em><br>today without a ticket?
  </div>

  <div class="sub">
    Daily enforcement status near <strong>Wrigley.</strong> Updated automatically.
  </div>

  <div class="badge">
    <div class="badge-answer">YES?</div>
  </div>
</body>
</html>
