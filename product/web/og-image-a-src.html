<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #1A1A2E;
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Yellow top bar */
  .bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: #F5E030;
  }

  /* Logo */
  .logo {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 28px;
    opacity: 0.7;
    position: relative;
    z-index: 1;
  }
  .logo span { color: #F5E030; }

  /* Small label above answer */
  .pre-label {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  /* Big answer */
  .answer {
    font-size: 148px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -.04em;
    color: #F5E030;
    position: relative;
    z-index: 1;
    margin-bottom: 28px;
  }

  /* Status detail */
  .detail {
    font-size: 26px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    position: relative;
    z-index: 1;
  }
  .detail strong {
    color: #F5E030;
    font-weight: 900;
  }

  /* Ghost zone label right */
  .zone-ghost {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 240px;
    font-weight: 900;
    line-height: 1;
    color: rgba(245,224,48,0.06);
    letter-spacing: -.06em;
    z-index: 0;
    user-select: none;
  }

  /* Domain */
  .domain {
    position: absolute;
    bottom: 36px;
    right: 80px;
    font-size: 20px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: .04em;
    z-index: 1;
  }
  .domain strong { color: #F5E030; font-weight: 900; }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="zone-ghost">LV2</div>

  <div class="logo">LV2 <span>PARK</span></div>

  <div class="pre-label">Can I park in LV2 today?</div>

  <div class="answer">SAFE.</div>

  <div class="detail">
    No Cubs game tonight &mdash; Zone 383 enforcement inactive. <strong>lv2park.com</strong>
  </div>

  <div class="domain">lv2park.com</div>
</body>
</html>
