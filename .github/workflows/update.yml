name: Daily Data Update

on:
  schedule:
    # Primary runs. Offset to :07 to avoid top-of-hour GitHub Actions load
    # (scheduled workflows at :00 get queued or dropped when runner load spikes).
    - cron: '7 5 * * *'    # 12:07 AM CT (UTC-5) -- midnight run, resets today.json for new date
    - cron: '7 11 * * *'   # 6:07 AM CT (UTC-5) -- morning run
    - cron: '7 20 * * *'   # 3:07 PM CT (UTC-5) -- afternoon run + game day scan
    - cron: '7 22 * * *'   # 5:07 PM CT (UTC-5) -- enforcement window opens
    - cron: '7 1 * * *'    # 8:07 PM CT (UTC-5) -- mid-enforcement scan
    # Backup runs. If GitHub drops a primary slot, the :32 backup catches up
    # within 25 minutes. Workflow is idempotent -- it commits only when data
    # changed, so a successful primary makes the backup a no-op.
    - cron: '32 5 * * *'   # 12:32 AM CT -- backup for midnight rollover
    - cron: '32 11 * * *'  # 6:32 AM CT -- backup for morning run
    - cron: '32 20 * * *'  # 3:32 PM CT -- backup for afternoon run
    - cron: '32 22 * * *'  # 5:32 PM CT -- backup for enforcement window
    - cron: '32 1 * * *'   # 8:32 PM CT -- backup for mid-enforcement scan
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      pages_changed: ${{ steps.commit.outputs.pages_changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: product/web
        run: pip install requests pytz

      - name: Fetch data
        working-directory: product/web
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: |
          # Retry up to 3 times with 30-second backoff. Handles transient
          # MLB / Ticketmaster API failures that would otherwise fail the run.
          for attempt in 1 2 3; do
            if python scripts/fetch_data.py; then
              echo "fetch_data succeeded on attempt $attempt"
              exit 0
            fi
            echo "fetch_data attempt $attempt failed"
            [ $attempt -lt 3 ] && sleep 30
          done
          echo "All 3 fetch_data attempts failed"
          exit 1

      - name: Send Monday digest
        working-directory: product/web
        env:
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ "$(date +%u)" = "1" ]; then
            echo "Monday -- sending digest"
            python scripts/send_digest.py
          else
            echo "Not Monday (day $(date +%u)) -- skipping digest"
          fi

      - name: Check traffic + FlexOffers alert
        working-directory: product/web
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
          NOTIFY_EMAIL:    ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ "$(date +%u)" = "1" ]; then
            echo "Monday -- checking traffic"
            python scripts/check_traffic.py
          else
            echo "Not Monday -- skipping traffic check"
          fi

      - name: Generate game recap (morning after game days)
        working-directory: product/web
        run: |
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -v-1d +%Y-%m-%d)
          HOUR=$(date +%H)
          HAD_GAME=$(python3 -c "
          import json
          from datetime import date, timedelta
          yesterday = (date.today() - timedelta(days=1)).isoformat()
          try:
              data = json.load(open('data/week.json'))
              day = next((d for d in data['days'] if d['date'] == yesterday), None)
              print('yes' if day and day.get('hasEvent') else 'no')
          except: print('no')
          ")
          if [ "\$HAD_GAME" = "yes" ] && [ "\$HOUR" -lt "14" ]; then
            echo "Morning after game day -- generating recap"
            python scripts/generate_recaps.py --date \$YESTERDAY
          else
            echo "No recap needed"
          fi

      - name: Commit updated data + recaps
        id: commit
        run: |
          git config user.name  "lv2park-bot"
          git config user.email "bot@lv2park.com"
          git add product/web/data/today.json product/web/data/week.json product/web/data/health.json product/web/game-recaps/ product/web/sitemap.xml product/web/index.html || true
          if git diff --staged --quiet; then
            echo "pages_changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto update $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
            git push || (git pull --rebase origin main && git push)
            echo "pages_changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: update
    if: needs.update.outputs.pages_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main  # always deploy the latest committed state

      - name: Inject config into app.js
        env:
          WORKER_URL:         ${{ secrets.WORKER_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          sed -i "s|__WORKER_URL__|${WORKER_URL}|g" product/web/app.js
          sed -i "s|__TURNSTILE_SITE_KEY__|${TURNSTILE_SITE_KEY}|g" product/web/app.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: product/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
