name: Blog Content Reminder

# Runs on the 1st of each month at 9 AM CT (14:00 UTC)
# Also triggerable manually from GitHub Actions UI

on:
  schedule:
    - cron: "0 14 1 * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for blog posts due for drafting
        run: python product/web/scripts/content_reminder.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
